name: agroai
description: "Cattle Breed Detection System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP client for Flask inference API
  http: ^1.2.0

  # Image decoding / preprocessing
  image: ^4.2.0

  # Supabase Auth + Database
  supabase_flutter: ^2.5.0

  # Image picker (camera + gallery)
  image_picker: ^1.1.2

  # Cached network images
  cached_network_image: ^3.4.1

  # File paths
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cattle_model (1).tflite
    - assets/labels.txt
